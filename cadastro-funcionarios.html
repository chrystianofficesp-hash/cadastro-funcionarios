<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema RH</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f6f9;
}

/* LOGIN */

.login-container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.login-card h1{
    margin-bottom:20px;
    color:#222;
    text-align:center;
}

.login-card input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
}

.login-card button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.login-card button:hover{
    background:#1d4ed8;
}

.erro{
    color:red;
    margin-top:10px;
    text-align:center;
}

/* SISTEMA */

.container{
    max-width:1300px;
    margin:auto;
    padding:20px;
    display:none;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logout-btn{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.logout-btn:hover{
    background:#b91c1c;
}

.title{
    font-size:32px;
    color:#222;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.section-title{
    margin-bottom:15px;
    color:#333;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    width:100%;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    margin-right:5px;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

.delete-btn{
    background:#dc2626;
}

.delete-btn:hover{
    background:#b91c1c;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.dashboard-card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.dashboard-card h2{
    font-size:18px;
    color:#666;
}

.dashboard-card p{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
    color:#111;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#2563eb;
    color:white;
}

.foto{
    width:70px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #ddd;
}

.preview-foto{
    width:100px;
    height:130px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #ccc;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login-container" id="loginTela">

<div class="login-card">

<h1>Login RH</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="fazerLogin()">
Entrar
</button>

<p class="erro" id="mensagemErro"></p>

</div>

</div>

<!-- SISTEMA -->

<div class="container" id="sistema">

<div class="topo">

<h1 class="title">
Sistema de Cadastro de Funcionários
</h1>

<button class="logout-btn" onclick="logout()">
Sair
</button>

</div>

<div class="dashboard">

<div class="dashboard-card">
<h2>Total Funcionários</h2>
<p id="totalFuncionarios">0</p>
</div>

<div class="dashboard-card">
<h2>Total Salários</h2>
<p id="totalSalarios">R$ 0</p>
</div>

</div>

<div class="card">

<h2 class="section-title">
Cadastrar Funcionário
</h2>

<div class="form-grid">

<input type="text" id="nome" placeholder="Nome Completo">

<input type="text" id="cpf" placeholder="CPF">

<input type="text" id="cargo" placeholder="Cargo">

<input type="text" id="telefone" placeholder="Telefone">

<input type="email" id="email" placeholder="E-mail">

<input type="text" id="setor" placeholder="Setor">

<input type="number" id="salario" placeholder="Salário">

<input type="text" id="banco" placeholder="Banco">

<input type="text" id="conta" placeholder="Conta Bancária">

<input type="text"
id="admissao"
placeholder="Data de Admissão (DD/MM/AAAA)">

<div>

<input
type="file"
id="foto"
accept="image/png, image/jpeg">

<img
id="preview"
class="preview-foto"
src="https://via.placeholder.com/100x130.png?text=3x4">

</div>

</div>

<br>

<button onclick="salvarFuncionario()">
Salvar Funcionário
</button>

</div>

<div class="card">

<h2 class="section-title">
Funcionários Cadastrados
</h2>

<table>

<thead>
<tr>
<th>Foto</th>
<th>Nome</th>
<th>Cargo</th>
<th>Setor</th>
<th>Admissão</th>
<th>Salário</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaFuncionarios">

</tbody>

</table>

</div>

</div>

<script>

/* LOGIN */

const LOGIN_USUARIO = "admin";
const LOGIN_SENHA = "123456";

function fazerLogin(){

    const usuario =
    document.getElementById("usuario").value;

    const senha =
    document.getElementById("senha").value;

    if(usuario === LOGIN_USUARIO &&
       senha === LOGIN_SENHA){

        localStorage.setItem("logado","sim");

        abrirSistema();

    }else{

        document.getElementById("mensagemErro")
        .innerText = "Usuário ou senha incorretos";
    }
}

function abrirSistema(){

    document.getElementById("loginTela")
    .style.display = "none";

    document.getElementById("sistema")
    .style.display = "block";
}

function logout(){

    localStorage.removeItem("logado");

    location.reload();
}

if(localStorage.getItem("logado") === "sim"){

    abrirSistema();
}

/* SISTEMA */

let funcionarios =
JSON.parse(localStorage.getItem("funcionarios")) || [];

let editandoIndex = -1;

let fotoBase64 = "";

document.getElementById("foto")
.addEventListener("change", function(){

    const arquivo = this.files[0];

    if(!arquivo) return;

    if(arquivo.size > 1024 * 1024){

        alert("A imagem deve ter no máximo 1MB");

        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        fotoBase64 = e.target.result;

        document.getElementById("preview").src =
        fotoBase64;
    }

    reader.readAsDataURL(arquivo);

});

function salvarFuncionario(){

    const funcionario = {

        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        cargo: document.getElementById("cargo").value,
        telefone: document.getElementById("telefone").value,
        email: document.getElementById("email").value,
        setor: document.getElementById("setor").value,
        salario: Number(document.getElementById("salario").value),
        banco: document.getElementById("banco").value,
        conta: document.getElementById("conta").value,
        admissao: document.getElementById("admissao").value,
        foto: fotoBase64
    };

    if(editandoIndex === -1){

        funcionarios.push(funcionario);

    }else{

        if(fotoBase64 === ""){

            funcionario.foto =
            funcionarios[editandoIndex].foto;
        }

        funcionarios[editandoIndex] = funcionario;

        editandoIndex = -1;
    }

    localStorage.setItem(
        "funcionarios",
        JSON.stringify(funcionarios)
    );

    atualizarTabela();

    limparCampos();
}

function atualizarTabela(){

    const tabela =
    document.getElementById("tabelaFuncionarios");

    tabela.innerHTML = "";

    let totalSalarios = 0;

    funcionarios.forEach((funcionario,index)=>{

        totalSalarios += funcionario.salario;

        tabela.innerHTML += `

        <tr>

            <td>
                <img class="foto"
                src="${funcionario.foto}">
            </td>

            <td>${funcionario.nome}</td>

            <td>${funcionario.cargo}</td>

            <td>${funcionario.setor}</td>

            <td>${funcionario.admissao}</td>

            <td>
            R$ ${funcionario.salario.toLocaleString("pt-BR")}
            </td>

            <td>

                <button onclick="editarFuncionario(${index})">
                Editar
                </button>

                <button
                class="delete-btn"
                onclick="deletarFuncionario(${index})">
                Excluir
                </button>

            </td>

        </tr>

        `;
    });

    document.getElementById("totalFuncionarios")
    .innerText = funcionarios.length;

    document.getElementById("totalSalarios")
    .innerText =
    "R$ " + totalSalarios.toLocaleString("pt-BR");
}

function editarFuncionario(index){

    const funcionario = funcionarios[index];

    document.getElementById("nome").value =
    funcionario.nome;

    document.getElementById("cpf").value =
    funcionario.cpf;

    document.getElementById("cargo").value =
    funcionario.cargo;

    document.getElementById("telefone").value =
    funcionario.telefone;

    document.getElementById("email").value =
    funcionario.email;

    document.getElementById("setor").value =
    funcionario.setor;

    document.getElementById("salario").value =
    funcionario.salario;

    document.getElementById("banco").value =
    funcionario.banco;

    document.getElementById("conta").value =
    funcionario.conta;

    document.getElementById("admissao").value =
    funcionario.admissao;

    document.getElementById("preview").src =
    funcionario.foto;

    fotoBase64 = funcionario.foto;

    editandoIndex = index;
}

function deletarFuncionario(index){

    if(confirm("Deseja realmente excluir este funcionário?")){

        funcionarios.splice(index,1);

        localStorage.setItem(
            "funcionarios",
            JSON.stringify(funcionarios)
        );

        atualizarTabela();
    }
}

function limparCampos(){

    document.querySelectorAll("input")
    .forEach(input => {

        if(input.type !== "file"){
            input.value = "";
        }

    });

    document.getElementById("foto").value = "";

    document.getElementById("preview").src =
    "https://via.placeholder.com/100x130.png?text=3x4";

    fotoBase64 = "";
}

atualizarTabela();

</script>

</body>
</html>
